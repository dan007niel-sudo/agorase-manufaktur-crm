services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agorase_fashion_os
    ports:
      - "5432:5432"
    volumes:
      - agorase-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agorase_fashion_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agorase-postgres-data:
