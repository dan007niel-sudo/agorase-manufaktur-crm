services:
  - type: web
    name: agorase-fashion-os-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run build:api
    startCommand: npm run start -w @agorase/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TEXT_MODEL
        value: gemini-2.5-pro
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3-pro-image-preview
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agorase-fashion-os-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false

  - type: web
    name: agorase-fashion-os-web
    runtime: static
    buildCommand: npm install && npm run build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://agorase-fashion-os-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "24"

databases:
  - name: agorase-fashion-os-db
    region: frankfurt
    plan: basic-256mb
    databaseName: agorase_fashion_os
    postgresMajorVersion: "18"
